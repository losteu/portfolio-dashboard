<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфельный анализ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--card:#fff;--brd:#e2e4ea;--brd2:#edeef2;--tx:#111827;--tx2:#4b5563;--tx3:#9ca3af;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;--blue-bg:#eff6ff;--green-bg:#ecfdf5;--red-bg:#fef2f2;--amber-bg:#fffbeb;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--sh:0 1px 2px rgba(0,0,0,.05);--sh2:0 4px 12px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:9px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.fu{animation:fu .3s ease-out both}
.wrap{max-width:1440px;margin:0 auto;padding:24px 28px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.file-btns{display:flex;gap:8px;flex-wrap:wrap}
.file-btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--sans);background:var(--card);border:1px solid var(--brd);color:var(--tx2);transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.file-btn:hover{border-color:var(--blue);color:var(--blue)}.file-btn.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}.file-btn input{display:none}
.period-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.period-bar label{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.period-bar input[type=date]{padding:5px 10px;border-radius:8px;border:1px solid var(--brd);font-size:13px;font-family:var(--sans);color:var(--tx);background:var(--card);outline:none}
.period-info{font-size:12px;font-family:var(--mono);color:var(--tx3);background:#f3f4f6;padding:4px 12px;border-radius:8px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.tabs{display:flex;gap:2px;background:#edeef2;border-radius:10px;padding:3px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--sans);transition:all .15s;background:transparent;color:var(--tx3)}.tab.on{background:var(--tx);color:#fff}
.nav-right{display:flex;gap:8px;align-items:center}
.badge-count{font-size:12px;font-family:var(--mono);color:var(--red);background:var(--red-bg);padding:3px 10px;border-radius:8px}
.toggle-sc{padding:6px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--card);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--sans);color:var(--tx2)}
.sc-panel{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:18px;box-shadow:var(--sh)}
.sc-section{margin-bottom:12px}.sc-section:last-child{margin-bottom:0}
.sc-head{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.sc-label{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.sc-search{padding:5px 10px;border-radius:8px;border:1px solid var(--brd);font-size:12px;font-family:var(--sans);outline:none;width:160px;background:#f9fafb;color:var(--tx)}
.sc-enableall{font-size:11px;background:none;border:none;cursor:pointer;font-family:var(--sans)}
.sc-chips{display:flex;gap:5px;flex-wrap:wrap;max-height:110px;overflow-y:auto;padding-right:4px}
.chip{padding:4px 12px;border-radius:16px;cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;line-height:20px;border:1.5px solid transparent}
.chip.on{color:#fff}.chip.off{background:#f3f4f6;color:#9ca3af;border:1.5px solid #e5e7eb;text-decoration:line-through;opacity:.65}
.sc-reset{margin-top:12px;border-top:1px solid var(--brd2);padding-top:10px}
.sc-reset button{padding:5px 14px;border-radius:8px;border:1px solid #fecaca;background:var(--card);color:var(--red);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--sans)}
.kpi-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.kpi{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px 18px;flex:1 1 150px;min-width:130px;box-shadow:var(--sh)}
.kpi.warn{background:var(--red-bg);border-color:#fecaca}
.kpi-label{font-size:9px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:var(--mono)}
.kpi-val{font-size:20px;font-weight:700;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--tx3);margin-top:2px;font-family:var(--mono)}
.kpi-delta{font-size:10px;margin-top:4px;font-family:var(--mono);display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;font-weight:500}
.kpi-delta.up{color:var(--green);background:var(--green-bg)}.kpi-delta.down{color:var(--red);background:var(--red-bg)}
.impact{border-radius:12px;padding:14px 20px;margin-bottom:18px;font-size:13px;line-height:1.6}
.impact.good{background:var(--green-bg);border:1px solid #86efac}.impact.bad{background:var(--red-bg);border:1px solid #fecaca}
.card{background:var(--card);border:1px solid var(--brd);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
.card-head{padding:16px 20px 0}.card-head h3{font-size:15px;font-weight:700;margin-bottom:2px}.card-head p{font-size:12px;color:var(--tx3);margin-bottom:10px}
.card-scroll{max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;color:var(--tx3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;font-family:var(--sans);background:#fafbfc;border-bottom:2px solid var(--brd);position:sticky;top:0;z-index:1}
td{padding:8px 12px;border-bottom:1px solid var(--brd2);font-size:13px}tr.dim{opacity:.3}
.bar-wrap{height:10px;border-radius:5px;overflow:hidden;flex-shrink:0;background:#f3f4f6}.bar-fill{height:100%;border-radius:5px;transition:width .4s}
.badge-pct{padding:2px 8px;border-radius:8px;font-size:11px;font-family:var(--mono);font-weight:500;display:inline-block}
.area-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.area-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--sh);transition:opacity .3s}
.area-card.off{opacity:.3}.area-card.warn-b{border:1.5px solid #fecaca}.area-card:not(.warn-b){border:1.5px solid var(--brd)}
.area-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.area-card h4{font-size:14px;font-weight:700;margin-bottom:2px}
.area-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.area-meta-tag{font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:8px}
.area-row{display:flex;justify-content:space-between;padding:5px 0}.area-row:not(:last-child){border-bottom:1px solid var(--brd2)}
.area-warn{margin-top:12px;padding:8px 12px;background:var(--red-bg);border-radius:8px;font-size:12px;color:#b91c1c;line-height:1.4}
.area-cost-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0;padding:10px;background:#f9fafb;border-radius:8px}
.area-cost-item{text-align:center}.area-cost-item .lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}.area-cost-item .val{font-size:13px;font-weight:600;font-family:var(--mono)}
.gauge{width:100%;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:4px}.gauge-fill{height:100%;border-radius:3px;transition:width .4s}
.wf-row{display:flex;align-items:center;gap:14px;padding:9px 0}.wf-row:not(.bold){border-bottom:1px solid var(--brd2)}.wf-row.bold{border-bottom:2px solid var(--brd)}
.wf-label{width:280px;font-size:13px;color:var(--tx2)}.wf-row.bold .wf-label{color:var(--tx);font-weight:700}
.wf-bar{width:200px}.wf-val{font-family:var(--mono);font-size:13px;min-width:130px;text-align:right}.wf-row.bold .wf-val{font-weight:700}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:16px}
.chart-card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:20px;box-shadow:var(--sh)}
.chart-card h3{font-size:14px;font-weight:700;margin-bottom:4px}.chart-card p{font-size:11px;color:var(--tx3);margin-bottom:12px}
.chart-card.full{grid-column:1/-1}
.footer{margin-top:28px;padding:12px 0;border-top:1px solid var(--brd);font-size:11px;color:var(--tx3);font-family:var(--mono);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.toast{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:10px;font-size:13px;font-family:var(--sans);z-index:999;max-width:460px;line-height:1.5;box-shadow:var(--sh2);animation:fu .3s ease-out both}
.toast.ok{background:var(--green-bg);border:1px solid #86efac;color:var(--green)}.toast.err{background:var(--red-bg);border:1px solid #fecaca;color:var(--red)}.toast.info{background:var(--blue-bg);border:1px solid #93c5fd;color:var(--blue)}
.redist-note{background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:8px 14px;font-size:12px;color:#6d28d9;margin-bottom:18px;font-family:var(--sans)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ══════ STATE ══════ */
let S={
  areaAgg:[],   /* Sheet2: [{name,month,util,direct,distL,distNL,total,marginInc,finResult}] */
  tpData:[],    /* Sheet1: [{group,area,gpName,gpCode,month,qty,direct,distL,distNL,marginInc}] */
  allShips:[],  /* SQL */
  sqlOk:false,areaOk:false,
  offA:new Set(),offG:new Set(),offC:new Set(),
  tab:'overview',scOpen:true,dateFrom:'',dateTo:'',searchG:'',searchC:'',searchTP:''
};
let charts={};
const DEMO=true;

/* ══════ HELPERS ══════ */
const fmt=n=>{if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'М';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'К';return Math.round(n).toString()};
const fmtF=n=>n.toLocaleString('ru-RU',{maximumFractionDigits:0})+' ₽';
const pct=n=>(n*100).toFixed(1)+'%';
const parseNum=v=>{if(v==null||v==='')return 0;let s=String(v).trim().replace(/\s/g,'').replace(/,/g,'.');return parseFloat(s)||0};
const detectDelim=t=>{const l=(t.split(/\r?\n/)[0])||'';if(l.includes('\t'))return'\t';if(l.includes(';'))return';';return','};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const accents=['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#ec4899','#14b8a6','#6366f1'];
function tog(set,id){set.has(id)?set.delete(id):set.add(id)}
const CHART_COLORS=['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#ec4899','#14b8a6','#6366f1','#f97316','#06b6d4','#84cc16','#e11d48'];
function chartFont(){return{family:"'IBM Plex Sans',sans-serif",size:11}}

/* Month parsing */
const RU_MONTHS={'январь':'01','февраль':'02','март':'03','апрель':'04','май':'05','июнь':'06','июль':'07','август':'08','сентябрь':'09','октябрь':'10','ноябрь':'11','декабрь':'12'};
function parseRuMonth(s){if(!s)return'';s=String(s).trim().toLowerCase();for(const[name,num]of Object.entries(RU_MONTHS)){if(s.includes(name)){const m=s.match(/\d{4}/);if(m)return m[0]+'-'+num}}if(/^\d{6}$/.test(s))return s.slice(0,4)+'-'+s.slice(4);if(/^\d{4}-\d{2}/.test(s))return s.slice(0,7);return''}
function dateToMonth(d){return d?d.slice(0,7):''}
function normalizeDate(d){if(!d)return'';if(/^\d{2}\.\d{2}\.\d{4}/.test(d)){const p=d.split('.');return p[2]+'-'+p[1]+'-'+p[0]}if(/^\d{4}-\d{2}-\d{2}/.test(d))return d.slice(0,10);const dt=new Date(d);if(!isNaN(dt))return dt.toISOString().slice(0,10);return''}

/* ══════ DATA ACCESS ══════ */
function getAreaNames(){return[...new Set(S.areaAgg.map(r=>r.name))].sort()}

function getAreaAggPeriod(areaName){
  const fm=dateToMonth(S.dateFrom),tm=dateToMonth(S.dateTo);
  const rows=S.areaAgg.filter(r=>r.name===areaName&&(!fm||r.month>=fm)&&(!tm||r.month<=tm));
  if(!rows.length)return{direct:0,distL:0,distNL:0,marginInc:0,avgUtil:0,months:0,finResult:0};
  return{direct:rows.reduce((a,r)=>a+r.direct,0),distL:rows.reduce((a,r)=>a+r.distL,0),distNL:rows.reduce((a,r)=>a+r.distNL,0),
    marginInc:rows.reduce((a,r)=>a+r.marginInc,0),avgUtil:rows.reduce((a,r)=>a+r.util,0)/rows.length,months:rows.length,
    finResult:rows.reduce((a,r)=>a+r.finResult,0)};
}

/* TP data filtered by period */
function getTPdata(){
  const fm=dateToMonth(S.dateFrom),tm=dateToMonth(S.dateTo);
  return S.tpData.filter(r=>(!fm||r.month>=fm)&&(!tm||r.month<=tm));
}

function getShips(){let d=S.allShips;if(S.dateFrom)d=d.filter(s=>s.date>=S.dateFrom);if(S.dateTo)d=d.filter(s=>s.date<=S.dateTo);return d}
function getGroups(ships){const m=new Map();ships.forEach(s=>{if(!m.has(s.gpGroup))m.set(s.gpGroup,{id:s.gpGroup,name:s.gpGroup,gpIds:new Set()});m.get(s.gpGroup).gpIds.add(s.gpId)});return[...m.values()]}
function getClients(ships){return[...new Set(ships.map(s=>s.client))].sort()}

/* GP→Area mapping from TP data */
function gpToAreaMap(){
  const m=new Map();
  S.tpData.forEach(r=>{if(r.gpCode&&r.group)m.set(String(r.gpCode),r.group)});
  return m;
}
function g2aMap(groups,gpa){const m=new Map();groups.forEach(g=>{const nms=[...g.gpIds].map(id=>gpa.get(String(id))).filter(Boolean);if(nms.length)m.set(g.id,nms[0])});return m}
function effOff(groups,g2a){const s=new Set(S.offG);groups.forEach(g=>{const a=g2a.get(g.id);if(a&&S.offA.has(a))s.add(g.id)});return s}

/* ═══ REDISTRIBUTION LOGIC ═══ */
function calcFull(ships,gpa,g2a){
  const rev=ships.reduce((a,s)=>a+s.revenue,0),vc=ships.reduce((a,s)=>a+s.rawCost+s.normCost+s.transport,0),cm1=rev-vc;
  const allAreas=getAreaNames();
  const activeAreas=allAreas.filter(n=>!S.offA.has(n));
  const disabledAreas=allAreas.filter(n=>S.offA.has(n));

  let totDirect=0,totDistL=0,origDistNL=0;
  /* Total "без логики" pool = constant regardless of scenario */
  let totalPoolNL=0;
  allAreas.forEach(n=>{const ag=getAreaAggPeriod(n);totalPoolNL+=ag.distNL});

  /* Active area costs */
  activeAreas.forEach(n=>{const ag=getAreaAggPeriod(n);totDirect+=ag.direct;totDistL+=ag.distL;origDistNL+=ag.distNL});

  /* Redistributed: disabled NL goes to active proportionally → total NL = full pool always */
  const redistNL=totalPoolNL; /* entire pool stays */

  const cm2=cm1-totDirect;
  const cm3=cm2-totDistL;
  const opResult=cm3-redistNL;

  return{rev,vc,cm1,cm2,cm3,opResult,totDirect,totDistL,totDistNL:redistNL,totalPoolNL,
    savedDirect:allAreas.reduce((a,n)=>a+getAreaAggPeriod(n).direct,0)-totDirect,
    savedDistL:allAreas.reduce((a,n)=>a+getAreaAggPeriod(n).distL,0)-totDistL,
    m1:rev>0?cm1/rev:0,m2:rev>0?cm2/rev:0,m3:rev>0?cm3/rev:0,mOp:rev>0?opResult/rev:0};
}

function bar(v,max,color,w){const r=max>0?Math.min(Math.abs(v)/max,1):0;return`<div class="bar-wrap" style="width:${w||140}px"><div class="bar-fill" style="width:${r*100}%;background:${v<0?'#fca5a5':color}"></div></div>`}
function badge(val){const bg=val>.3?'var(--green-bg)':val>.15?'var(--amber-bg)':'var(--red-bg)';const c=val>.3?'var(--green)':val>.15?'var(--amber)':'var(--red)';return`<span class="badge-pct" style="background:${bg};color:${c}">${pct(val)}</span>`}
function utilColor(u){return u>=80?'var(--green)':u>=50?'var(--amber)':'var(--red)'}
let toastTimer;function toast(msg,type){let el=document.getElementById('toast');if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el)}el.className='toast '+(type||'info');el.textContent=msg;clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.remove(),5000)}

/* ══════ LOADERS ══════ */
function mapRows(data){return data.map(r=>{const g=(...ks)=>{for(const k of ks){const v=r[k];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return null};return{orderId:g("Код заявки","ORDER_ID")||"",date:g("Дата заявки (отгрузки)","Дата_заявки","Order_Date")||"",client:g("Клиент","Client_Name","Клиент ")||"",gpGroup:g("Товарная группа","Товарная_группа","GP_Group")||"",gpName:g("Готовая продукция (ГП)","Готовая продукция","GP_Name")||"",gpId:String(g("Код_ГП","Код ГП","GP_ID","TOV_ID")||""),qty:parseNum(g("Отгружено ГП (кг)","Отгружено_ГП_(кг)","GP_Qty")),revenue:parseNum(g("Выручка по ГП (RUR)","Revenue_RUR")),rawCost:parseNum(g("Прямые_Затраты_Сырье_Склад")),normCost:parseNum(g("Прямые_Затраты_Нормы_Цех")),transport:parseNum(g("Прямые_Затраты_Транспорт"))}}).filter(r=>r.revenue>0)}

function loadSQL(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls'){const rd=new FileReader();rd.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});const rows=mapRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{raw:false}));rows.forEach(r=>r.date=normalizeDate(r.date));if(rows.length){S.allShips=rows;S.sqlOk=true;S.offA=new Set();S.offG=new Set();S.offC=new Set();autoSetDates();render();toast('✓ '+rows.length+' строк','ok')}else toast('Нет данных','err')}catch(err){toast(err.message,'err')}};rd.readAsArrayBuffer(file);return}
  const tryEnc=enc=>{const rd=new FileReader();rd.onload=e=>{let txt=e.target.result;if(txt.charCodeAt(0)===0xFEFF)txt=txt.slice(1);const dl=detectDelim(txt);const p=Papa.parse(txt,{header:true,skipEmptyLines:true,delimiter:dl});if(!p.data?.length){if(enc==='UTF-8')tryEnc('windows-1251');else toast('Не удалось','err');return}const rows=mapRows(p.data);rows.forEach(r=>r.date=normalizeDate(r.date));if(rows.length){S.allShips=rows;S.sqlOk=true;S.offA=new Set();S.offG=new Set();S.offC=new Set();autoSetDates();render();toast('✓ '+rows.length+' строк','ok')}else{if(enc==='UTF-8')tryEnc('windows-1251');else toast('Колонки не совпали','err')}};rd.readAsText(file,enc)};tryEnc('UTF-8');
}

function loadAreas(file){
  const rd=new FileReader();rd.onload=e=>{try{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const sheets=wb.SheetNames;

    /* Find sheets by content */
    let tpSheet=null,areaSheet=null;
    for(const sn of sheets){
      const d=XLSX.utils.sheet_to_json(wb.Sheets[sn],{range:0});
      const cols=Object.keys(d[0]||{}).join(' ').toLowerCase();
      if(cols.includes('код тп')||cols.includes('код_тп'))tpSheet=sn;
      else if(cols.includes('загруженность')||cols.includes('период'))areaSheet=sn;
    }
    if(!tpSheet)tpSheet=sheets.find(s=>s.includes('ТП'))||sheets[0];
    if(!areaSheet)areaSheet=sheets.find(s=>s.includes('участк'))||sheets[1]||sheets[0];

    /* Parse Sheet: TP data */
    const tpRaw=XLSX.utils.sheet_to_json(wb.Sheets[tpSheet]);
    const tp=tpRaw.map(r=>{
      const g=(...ks)=>{for(const k of ks){const v=r[k];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return null};
      const month6=g("Месяц","месяц","month");
      return{
        group:g("Группа участков","Группа_участков","group")||"",
        area:g("Участок","участок","area")||"",
        gpName:g("ГП","гп","gpName")||"",
        gpCode:String(g("код ТП","код_ТП","Код_ГП","gpCode")||""),
        month:month6?(/^\d{6}$/.test(month6)?month6.slice(0,4)+'-'+month6.slice(4):parseRuMonth(month6)):"",
        qty:parseNum(g("Кол-во ГП (кг)_","Кол-во ГП","qty")),
        direct:Math.abs(parseNum(g("Прямые затраты, руб","Прямые_затраты","Прямые затраты","direct"))),
        distL:Math.abs(parseNum(g("Распределенные с логикой затраты","Распред_с_логикой","distL"))),
        distNL:Math.abs(parseNum(g("Распределенные без логики затраты","Распред_без_логики","distNL"))),
        marginInc:parseNum(g("Маржинальный доход от выпуска, руб","Маржинальный_доход","marginInc")),
      };
    }).filter(r=>r.group&&r.month);

    /* Parse Sheet: Area aggregates */
    const areaRaw=XLSX.utils.sheet_to_json(wb.Sheets[areaSheet]);
    const aa=areaRaw.map(r=>{
      const g=(...ks)=>{for(const k of ks){const v=r[k];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return null};
      return{
        name:g("Наименование группы Участков","Наименование_участка","name")||"",
        month:parseRuMonth(g("период","Месяц","month")||""),
        util:parseNum(g(" Загруженность","Загруженность","Загруженность_процент","util"))*100,
        direct:Math.abs(parseNum(g(" Прямые затраты, руб","Прямые_затраты","Прямые затраты","direct"))),
        distL:Math.abs(parseNum(g(" Распределенные с логикой затраты","Распред_с_логикой","Распределенные с логикой","distL"))),
        distNL:Math.abs(parseNum(g(" Распределенные без логики затраты","Распред_без_логики","Распределенные без логики","distNL"))),
        total:Math.abs(parseNum(g(" Итого затраты, руб","Итого","total"))),
        marginInc:parseNum(g(" Маржинальный доход от выпуска, руб","Маржинальный_доход","marginInc")),
        finResult:parseNum(g(" Финансовый результат от выпуска, руб","Финансовый_результат","finResult")),
      };
    }).filter(r=>r.name&&r.month);

    if(tp.length)S.tpData=tp;
    if(aa.length)S.areaAgg=aa;
    if(tp.length||aa.length){S.areaOk=true;S.offA=new Set();render();toast('✓ '+tp.length+' ТП, '+aa.length+' участков','ok')}
    else toast('Данные не найдены','err');
  }catch(err){toast(err.message,'err')}};rd.readAsArrayBuffer(file);
}

/* ══════ RENDER ══════ */
function render(){
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  const ships=getShips(),groups=getGroups(ships),clients=getClients(ships);
  const gpa_m=gpToAreaMap(),g2a_m=g2aMap(groups,gpa_m),eog=effOff(groups,g2a_m);
  const active=ships.filter(s=>!eog.has(s.gpGroup)&&!S.offC.has(s.client));
  const base=calcFull(ships,gpa_m,g2a_m),cur=calcFull(active,gpa_m,g2a_m);
  const changed=S.offA.size>0||S.offG.size>0||S.offC.size>0,disN=S.offA.size+S.offG.size+S.offC.size;
  const areaNames=getAreaNames();

  const gStats=groups.map(g=>{const sh=active.filter(s=>s.gpGroup===g.id);const rev=sh.reduce((a,s)=>a+s.revenue,0);const vc=sh.reduce((a,s)=>a+s.rawCost+s.normCost+s.transport,0);return{...g,rev,vc,cm:rev-vc,margin:rev>0?(rev-vc)/rev:0,areaName:g2a_m.get(g.id)||'—',off:eog.has(g.id),qty:sh.reduce((a,s)=>a+s.qty,0)}}).sort((a,b)=>b.rev-a.rev);
  const cStats=clients.map(c=>{const sh=active.filter(s=>s.client===c);const rev=sh.reduce((a,s)=>a+s.revenue,0);const vc=sh.reduce((a,s)=>a+s.rawCost+s.normCost+s.transport,0);return{id:c,name:c,rev,vc,cm:rev-vc,margin:rev>0?(rev-vc)/rev:0,groups:[...new Set(sh.map(s=>s.gpGroup))].length,off:S.offC.has(c),qty:sh.reduce((a,s)=>a+s.qty,0)}}).sort((a,b)=>b.rev-a.rev);
  const aStats=areaNames.map(name=>{const ag=getAreaAggPeriod(name);const on=!S.offA.has(name);
    /* Count shipments linked to this area */
    const gpCodes=S.tpData.filter(r=>r.group===name).map(r=>r.gpCode);
    const sh=active.filter(s=>gpCodes.includes(String(s.gpId)));
    const rev=sh.reduce((a,s)=>a+s.revenue,0);const vc=sh.reduce((a,s)=>a+s.rawCost+s.normCost+s.transport,0);
    const cm1sql=rev-vc;
    /* Redistributed NL */
    let myNL=ag.distNL;
    if(changed&&on){
      const totalNL=areaNames.reduce((a,n)=>a+getAreaAggPeriod(n).distNL,0);
      const activeNL=areaNames.filter(n=>!S.offA.has(n)).reduce((a,n)=>a+getAreaAggPeriod(n).distNL,0);
      if(activeNL>0)myNL=ag.distNL/activeNL*totalNL;
    }
    return{name,...ag,myNL,rev,vc,cm1sql,on,cnt:sh.length,
      cm2:ag.marginInc-ag.direct,cm3:ag.marginInc-ag.direct-ag.distL,
      opResult:ag.marginInc-ag.direct-ag.distL-myNL};
  });

  /* TP stats aggregated by group */
  const tpFiltered=getTPdata();
  const tpByCode=new Map();
  tpFiltered.forEach(r=>{
    const key=r.gpCode;
    if(!tpByCode.has(key))tpByCode.set(key,{gpCode:r.gpCode,gpName:r.gpName,group:r.group,area:r.area,qty:0,direct:0,distL:0,distNL:0,marginInc:0});
    const o=tpByCode.get(key);o.qty+=r.qty;o.direct+=r.direct;o.distL+=r.distL;o.distNL+=r.distNL;o.marginInc+=r.marginInc;
  });
  let tpStats=[...tpByCode.values()].map(t=>({...t,finResult:t.marginInc-t.direct-t.distL-t.distNL,margin:t.marginInc>0?(t.marginInc-t.direct-t.distL)/t.marginInc:0}));
  if(S.searchTP)tpStats=tpStats.filter(t=>t.gpName.toLowerCase().includes(S.searchTP.toLowerCase())||t.group.toLowerCase().includes(S.searchTP.toLowerCase()));
  tpStats.sort((a,b)=>b.marginInc-a.marginInc);

  /* Client×Product */
  const cpMap=new Map();
  active.forEach(s=>{const key=s.client+'|||'+s.gpId;if(!cpMap.has(key))cpMap.set(key,{client:s.client,gpId:s.gpId,gpName:s.gpName,gpGroup:s.gpGroup,qty:0,revenue:0,rawCost:0,normCost:0,transport:0});const o=cpMap.get(key);o.qty+=s.qty;o.revenue+=s.revenue;o.rawCost+=s.rawCost;o.normCost+=s.normCost;o.transport+=s.transport});
  let cpStats=[...cpMap.values()].map(c=>({...c,cm:c.revenue-c.rawCost-c.normCost-c.transport,margin:c.revenue>0?(c.revenue-c.rawCost-c.normCost-c.transport)/c.revenue:0})).sort((a,b)=>b.revenue-a.revenue);

  const maxGR=Math.max(...gStats.map(g=>g.rev),1),maxCR=Math.max(...cStats.map(c=>c.rev),1);

  const fClients=S.searchC?clients.filter(c=>c.toLowerCase().includes(S.searchC.toLowerCase())):clients;
  function kpi(label,val,sub,delta,warn){let h=`<div class="kpi${warn?' warn':''}"><div class="kpi-label">${label}</div><div class="kpi-val" style="color:${warn?'var(--red)':'var(--tx)'}">${val}</div>`;if(sub)h+=`<div class="kpi-sub">${sub}</div>`;if(delta!==undefined)h+=`<div class="kpi-delta ${delta>=0?'up':'down'}">${delta>=0?'↑':'↓'} ${fmtF(Math.abs(delta))}</div>`;return h+'</div>'}

  let html='';

  /* Scenario */

  html+=`<div class="sc-section"><div class="sc-head"><span class="sc-label">Клиенты</span>${clients.length>8?`<input class="sc-search" placeholder="Поиск…" id="sC" value="${esc(S.searchC)}">`:''} ${S.offC.size>0?'<button class="sc-enableall" id="enC" style="color:var(--green)">Вкл. все</button>':''}</div><div class="sc-chips">${fClients.map(c=>`<button class="chip ${S.offC.has(c)?'off':'on'}" style="${S.offC.has(c)?'':'background:var(--green)'}" data-tC="${esc(c)}">${esc(c)}</button>`).join('')}</div></div>`;
  if(changed)html+=`<div class="sc-reset"><button id="resetAll">↺ Сбросить</button></div>`;html+=`</div>`}

  /* KPIs */
  html+=`<div class="kpi-row fu">${kpi('Выручка',fmt(cur.rev)+' ₽',null,changed?cur.rev-base.rev:undefined)}${kpi('Маржа 1',fmt(cur.cm1)+' ₽',pct(cur.m1),changed?cur.cm1-base.cm1:undefined)}${kpi('Маржа 2',fmt(cur.cm2)+' ₽',pct(cur.m2),changed?cur.cm2-base.cm2:undefined)}${kpi('Маржа 3',fmt(cur.cm3)+' ₽',pct(cur.m3),changed?cur.cm3-base.cm3:undefined)}${kpi('Опер. рез.',fmt(cur.opResult)+' ₽',pct(cur.mOp),changed?cur.opResult-base.opResult:undefined,cur.opResult<0)}</div>`;

    const good=cur.opResult>=base.opResult;
    html+=`<div class="impact fu ${good?'good':'bad'}"><strong style="color:${good?'var(--green)':'var(--red)'}">${good?'✓ Улучшает':'⚠ Ухудшает'}</strong> опер. результат на <strong style="font-family:var(--mono)">${fmtF(Math.abs(cur.opResult-base.opResult))}</strong></div>`;

  /* ═══ CLIENTS ═══ */
  if(S.tab==='clients'){html+=`<div class="card fu"><div class="card-head"><h3>Клиенты</h3><p>${cStats.length} клиентов</p></div><div class="card-scroll"><table><thead><tr>${['Клиент','Групп','Выручка','Маржа 1','Рент.','Доля',''].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${cStats.map(c=>`<tr${c.off?' class="dim"':''}><td style="font-weight:600">${esc(c.name)}</td><td style="color:var(--tx3);text-align:center">${c.groups}</td><td style="font-family:var(--mono)">${fmt(c.rev)}</td><td style="font-family:var(--mono);font-weight:600;color:${c.cm>=0?'var(--green)':'var(--red)'}">${fmt(c.cm)}</td><td>${badge(c.margin)}</td><td style="font-family:var(--mono);font-size:12px;color:var(--tx3)">${cur.rev>0?pct(c.rev/cur.rev):'—'}</td><td>${bar(c.rev,maxCR,'var(--green)',90)}</td></tr>`).join('')}</tbody></table></div></div>`}

  /* ═══ PRODUCTS ═══ */
  if(S.tab==='products'){

      <input class="sc-search" placeholder="Поиск по названию или участку…" id="sTP" value="${esc(S.searchTP)}" style="width:300px;margin-bottom:8px"></div>
      <div class="card-scroll"><table><thead><tr>${['Продукция','Участок','Выпуск кг','Прямые','Распр.лог','Без логики','Марж.доход','Фин.рез','Рент.'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>
        ${tpStats.slice(0,200).map(t=>{const fr=t.finResult;return`<tr>

          <td>${badge(t.margin)}</td></tr>`}).join('')}
      </tbody></table></div></div>`;
    if(tpStats.length>200)html+=`<p style="margin-top:8px;font-size:12px;color:var(--tx3)">Показано 200 из ${tpStats.length}. Используйте поиск для фильтрации.</p>`;
  }

  if(S.tab==='clientprod'){

      <div class="card-scroll"><table><thead><tr>${['Клиент','Продукт','Группа','Кг','Выручка','Перем.затр','Маржа 1','Рент.'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>
        ${cpStats.slice(0,300).map(c=>`<tr>
          <td style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.client)}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.gpName)}">${esc(c.gpName.length>30?c.gpName.slice(0,30)+'…':c.gpName)}</td>

          <td style="font-family:var(--mono);font-size:12px">${fmt(c.revenue)}</td>
          <td style="font-family:var(--mono);font-size:12px;color:var(--red)">${fmt(c.rawCost+c.normCost+c.transport)}</td>
          <td style="font-family:var(--mono);font-size:12px;font-weight:600;color:${c.cm>=0?'var(--green)':'var(--red)'}">${fmt(c.cm)}</td>
          <td>${badge(c.margin)}</td></tr>`).join('')}
      </tbody></table></div></div>`;
    if(cpStats.length>300)html+=`<p style="margin-top:8px;font-size:12px;color:var(--tx3)">Показано 300 из ${cpStats.length}</p>`;
  }

  /* ═══ AREAS ═══ */
  if(S.tab==='areas'){html+=`<div class="area-grid fu">${aStats.map(a=>{const fin=a.opResult;return`<div class="area-card${a.on?'':' off'}${fin<0&&a.on?' warn-b':''}"><div class="area-top"><div><h4>${esc(a.name)}</h4><span style="font-size:11px;color:var(--tx3);font-family:var(--mono)">${a.cnt} отгр. · ${a.months} мес</span></div></div><div class="area-meta"><span class="area-meta-tag" style="background:${a.avgUtil>=80?'var(--green-bg)':a.avgUtil>=50?'var(--amber-bg)':'var(--red-bg)'};color:${utilColor(a.avgUtil)}">Загрузка: ${a.avgUtil.toFixed(0)}%</span></div><div class="gauge"><div class="gauge-fill" style="width:${Math.min(a.avgUtil,100)}%;background:${utilColor(a.avgUtil)}"></div></div>
    <div class="area-cost-grid"><div class="area-cost-item"><div class="lbl">Прямые</div><div class="val" style="color:var(--red)">${fmt(a.direct)}</div></div><div class="area-cost-item"><div class="lbl">Распр.лог</div><div class="val" style="color:var(--purple)">${fmt(a.distL)}</div></div><div class="area-cost-item"><div class="lbl">Без лог.${changed&&a.on?' ⚡':''}</div><div class="val" style="color:var(--tx3)">${fmt(a.myNL)}</div></div></div>
    ${[{l:'Марж.доход (выпуск)',v:a.marginInc},{l:'−Прямые',v:-a.direct},{l:'Маржа 2',v:a.cm2},{l:'−Распр.лог',v:-a.distL},{l:'Маржа 3',v:a.cm3},{l:'−Без логики'+(changed&&a.on?' (перераспр.)':''),v:-a.myNL},{l:'Фин. результат',v:fin}].map(r=>`<div class="area-row"><span style="font-size:12px;color:var(--tx2)">${r.l}</span><span style="font-family:var(--mono);font-size:13px;font-weight:600;color:${r.v<0?'var(--red)':'var(--tx)'}">${fmtF(r.v)}</span></div>`).join('')}
    ${fin<0&&a.on?`<div class="area-warn">⚠ Отрицательный: ${fmtF(fin)}</div>`:''}</div>`}).join('')}</div>`}

  html+=`<div class="footer"><span>${S.sqlOk?'✓ SQL':'◦ Демо'} · ${S.areaOk?'✓ Участки ('+S.tpData.length+' ТП)':'◦ Нет данных участков'}</span><span>${ships.length} отгрузок · ${clients.length} клиентов · ${groups.length} групп · ${areaNames.length} участков</span></div>`;
  document.getElementById('app').innerHTML=html;bindEvents();

  /* ═══ CHARTS ═══ */
  if(S.tab==='charts'){
    Chart.defaults.font.family="'IBM Plex Sans',sans-serif";Chart.defaults.font.size=11;const fmtTick=v=>fmt(v);
    /* Waterfall */
    const wV=[cur.rev,-active.reduce((a,s)=>a+s.rawCost,0),-active.reduce((a,s)=>a+s.normCost,0),-active.reduce((a,s)=>a+s.transport,0),cur.cm1,-cur.totDirect,cur.cm2,-cur.totDistL,cur.cm3,-cur.totDistNL,cur.opResult];
    const wL=['Выручка','Сырьё','Нормат.','Трансп.','Маржа 1','Прямые уч.','Маржа 2','Распр.лог','Маржа 3','Без лог.','Опер.рез'];
    const totals=new Set([0,4,6,8,10]);let run=0;const wB=wV.map((v,i)=>{if(totals.has(i)){const b=0;run=v;return b}const b=run;run+=v;return Math.min(b,run)});
    charts.wf=new Chart(document.getElementById('chWF'),{type:'bar',data:{labels:wL,datasets:[{label:'_',data:wB,backgroundColor:'transparent',borderWidth:0,barPercentage:.7},{label:'Значение',data:wV.map((v,i)=>totals.has(i)?Math.abs(v):Math.abs(v)),backgroundColor:wV.map((v,i)=>totals.has(i)?(v>=0?'#3b82f6':'#ef4444'):(v<0?'rgba(239,68,68,.7)':'rgba(16,185,129,.7)')),borderRadius:4,borderSkipped:false,barPercentage:.7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtF(wV[ctx.dataIndex])}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:fmtTick},grid:{color:'#f3f4f6'}}}}});
    /* Bubbles */
    const bg=gStats.filter(g=>!g.off&&g.rev>0).map(g=>({x:g.rev/1e6,y:g.margin*100,r:Math.max(Math.sqrt(g.qty)/8,4),label:g.name}));
    charts.bg=new Chart(document.getElementById('chBG'),{type:'bubble',data:{datasets:[{data:bg,backgroundColor:bg.map((_,i)=>CHART_COLORS[i%12]+'99'),borderColor:bg.map((_,i)=>CHART_COLORS[i%12]),borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${bg[ctx.dataIndex].label}: ${ctx.parsed.x.toFixed(1)}М, ${ctx.parsed.y.toFixed(1)}%`}}},scales:{x:{title:{display:true,text:'Выручка, млн',font:chartFont()},grid:{color:'#f3f4f6'}},y:{title:{display:true,text:'Рентабельность %',font:chartFont()},grid:{color:'#f3f4f6'}}}}});
    const bc=cStats.filter(c=>!c.off&&c.rev>0).slice(0,20).map(c=>({x:c.rev/1e6,y:c.margin*100,r:Math.max(Math.sqrt(c.qty)/8,4),label:c.name}));
    charts.bc=new Chart(document.getElementById('chBC'),{type:'bubble',data:{datasets:[{data:bc,backgroundColor:bc.map((_,i)=>CHART_COLORS[i%12]+'99'),borderColor:bc.map((_,i)=>CHART_COLORS[i%12]),borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${bc[ctx.dataIndex].label}: ${ctx.parsed.x.toFixed(1)}М, ${ctx.parsed.y.toFixed(1)}%`}}},scales:{x:{title:{display:true,text:'Выручка, млн',font:chartFont()},grid:{color:'#f3f4f6'}},y:{title:{display:true,text:'Рентабельность %',font:chartFont()},grid:{color:'#f3f4f6'}}}}});
    /* Pareto */
    const ps=cStats.filter(c=>!c.off&&c.rev>0).sort((a,b)=>b.rev-a.rev).slice(0,20);const tR=ps.reduce((a,c)=>a+c.rev,0);let cm=0;const cp=ps.map(c=>{cm+=c.rev;return cm/tR*100});
    charts.p=new Chart(document.getElementById('chP'),{type:'bar',data:{labels:ps.map(c=>c.name.length>12?c.name.slice(0,12)+'…':c.name),datasets:[{label:'Выручка',data:ps.map(c=>c.rev),backgroundColor:'#3b82f6',borderRadius:4,yAxisID:'y',order:2},{label:'Кумул. %',data:cp,type:'line',borderColor:'#ef4444',backgroundColor:'transparent',borderWidth:2,pointRadius:3,yAxisID:'y1',order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:chartFont()}}},scales:{x:{grid:{display:false}},y:{position:'left',ticks:{callback:fmtTick},grid:{color:'#f3f4f6'}},y1:{position:'right',min:0,max:100,ticks:{callback:v=>v+'%'},grid:{display:false}}}}});
    /* Donut */
    const dd=gStats.filter(g=>!g.off&&g.rev>0).slice(0,10);
    charts.d=new Chart(document.getElementById('chD'),{type:'doughnut',data:{labels:dd.map(g=>g.name.length>20?g.name.slice(0,20)+'…':g.name),datasets:[{data:dd.map(g=>g.rev),backgroundColor:dd.map((_,i)=>CHART_COLORS[i%12]),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{font:chartFont(),padding:6,boxWidth:10}}}}});
    /* Area bars */
    const aa=aStats.filter(a=>a.on);
    charts.ab=new Chart(document.getElementById('chAB'),{type:'bar',data:{labels:aa.map(a=>a.name.length>16?a.name.slice(0,16)+'…':a.name),datasets:[{label:'Загрузка %',data:aa.map(a=>a.avgUtil),backgroundColor:aa.map(a=>a.avgUtil>=80?'#10b981':a.avgUtil>=50?'#f59e0b':'#ef4444'),borderRadius:4,yAxisID:'y'},{label:'Фин. рез.',data:aa.map(a=>a.opResult),backgroundColor:aa.map(a=>a.opResult>=0?'rgba(59,130,246,.6)':'rgba(239,68,68,.6)'),borderRadius:4,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:chartFont()}}},scales:{x:{grid:{display:false}},y:{position:'left',min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:'#f3f4f6'}},y1:{position:'right',ticks:{callback:fmtTick},grid:{display:false}}}}});
    charts.ac=new Chart(document.getElementById('chAC'),{type:'bar',data:{labels:aa.map(a=>a.name.length>16?a.name.slice(0,16)+'…':a.name),datasets:[{label:'Прямые',data:aa.map(a=>a.direct),backgroundColor:'#ef4444',borderRadius:2},{label:'Распр.лог',data:aa.map(a=>a.distL),backgroundColor:'#8b5cf6',borderRadius:2},{label:'Без логики',data:aa.map(a=>a.myNL),backgroundColor:'#9ca3af',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:chartFont(),boxWidth:10}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:fmtTick},grid:{color:'#f3f4f6'}}}}});
  }
}

function bindEvents(){
  document.getElementById('fSQL')?.addEventListener('change',e=>{const f=e.target.files?.[0];if(f)loadSQL(f)});
  document.getElementById('fArea')?.addEventListener('change',e=>{const f=e.target.files?.[0];if(f)loadAreas(f)});
  document.getElementById('dFrom')?.addEventListener('change',e=>{S.dateFrom=e.target.value;render()});
  document.getElementById('dTo')?.addEventListener('change',e=>{S.dateTo=e.target.value;render()});
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render()}));
  document.getElementById('toggleSc')?.addEventListener('click',()=>{S.scOpen=!S.scOpen;render()});
  document.querySelectorAll('[data-tA]').forEach(b=>b.addEventListener('click',()=>{tog(S.offA,b.dataset.ta);render()}));
  document.querySelectorAll('[data-tG]').forEach(b=>b.addEventListener('click',()=>{tog(S.offG,b.dataset.tg);render()}));
  document.querySelectorAll('[data-tC]').forEach(b=>b.addEventListener('click',()=>{tog(S.offC,b.dataset.tc);render()}));
  document.getElementById('sG')?.addEventListener('input',e=>{S.searchG=e.target.value;render();const el=document.getElementById('sG');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}});
  document.getElementById('sC')?.addEventListener('input',e=>{S.searchC=e.target.value;render();const el=document.getElementById('sC');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}});
  document.getElementById('sTP')?.addEventListener('input',e=>{S.searchTP=e.target.value;render();const el=document.getElementById('sTP');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}});
  document.getElementById('enG')?.addEventListener('click',()=>{S.offG=new Set();render()});
  document.getElementById('enC')?.addEventListener('click',()=>{S.offC=new Set();render()});
  document.getElementById('resetAll')?.addEventListener('click',()=>{S.offA=new Set();S.offG=new Set();S.offC=new Set();render()});
}
render();
</script>
</body>
</html>
